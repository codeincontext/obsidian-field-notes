services:
  field-notes-mia:
    image: ghcr.io/codeincontext/obsidian-field-notes:latest
    container_name: field-notes-mia
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      VAULT_PATH: /vault
    volumes:
      - vault:/vault
      - ob-config:/root/.config/obsidian-headless

volumes:
  vault:
  ob-config:
