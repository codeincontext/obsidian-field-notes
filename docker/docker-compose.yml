services:
  field-notes-mia:
    build:
      # Pin to a branch, tag, or SHA via #ref.
      context: https://github.com/codeincontext/obsidian-field-notes.git#main
      dockerfile: docker/Dockerfile
    container_name: field-notes-mia
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      VAULT_PATH: /vault
    volumes:
      - vault:/vault
      - ob-config:/root/.config/obsidian-headless

volumes:
  vault:
  ob-config:
