services:
  field-notes-mia:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: field-notes-mia
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      VAULT_PATH: /vault
    volumes:
      - vault:/vault
      - ob-config:/root/.config/obsidian-headless
      - hash-cache:/app/dist

volumes:
  vault:
  ob-config:
  hash-cache:
